name: Scrape & Deploy

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        working-directory: scraper
        run: npx tsx src/index.ts

      - name: Copy data to frontend public
        run: |
          mkdir -p frontend/public/data/history
          cp data/*.json frontend/public/data/
          cp data/history/*.json frontend/public/data/history/ 2>/dev/null || true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update pricing data [skip ci]"
          git push || true

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: pricing-data
          path: data/

  build-deploy:
    needs: scrape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download pricing data
        uses: actions/download-artifact@v4
        with:
          name: pricing-data
          path: data/

      - name: Copy data to frontend
        run: |
          mkdir -p frontend/public/data/history
          cp data/*.json frontend/public/data/
          cp data/history/*.json frontend/public/data/history/ 2>/dev/null || true

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_DATA_BASE: './'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
